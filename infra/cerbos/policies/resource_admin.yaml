---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: api:admin
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      roles: ["admin"]

    - actions: ["read"]
      effect: EFFECT_ALLOW
      roles: ["user"]

    - actions: ["*"]
      effect: EFFECT_DENY
      roles: ["viewer"]
