---
# principal.attr contract frozen at Epic 2A (ADR-2A7).
# Required attrs: department (string), clearance (string).
# Later epics MAY ADD new attrs but MUST NOT rename or remove these two.
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: api:chat
  rules:
    # DENY if resource specifies a data domain and user's department doesn't match.
    # This enforces row-level tenant isolation at the policy layer.
    - actions: ["query"]
      effect: EFFECT_DENY
      roles: ["admin", "user"]
      condition:
        match:
          all:
            of:
              - expr: "R.attr.domain != ''"
              - expr: "R.attr.domain != P.attr.department"

    # ALLOW if role is authorized AND principal attrs are present.
    # Domain-unrestricted resources (no R.attr.domain) pass through here.
    - actions: ["query"]
      effect: EFFECT_ALLOW
      roles: ["admin", "user"]
      condition:
        match:
          all:
            of:
              - expr: "P.attr.department != ''"
              - expr: "P.attr.clearance != ''"

    # Unconditional deny for viewer role on query.
    - actions: ["query"]
      effect: EFFECT_DENY
      roles: ["viewer"]

    - actions: ["admin"]
      effect: EFFECT_ALLOW
      roles: ["admin"]
